name: Build and Publish Docker image

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 19
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '19'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from Application.java
        id: get_version
        run: |
          VERSION=$(grep 'VERSION = ' src/Application.java | sed -E 's/.*\"([^"]+)\".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Run build_secured.sh
        run: |
          chmod +x build_secured.sh
          ./build_secured.sh

      - name: Run build.sh
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Build and push multi-platform Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          no-cache: true
          tags: |
            axtx2301/bentel-absoluta-local-bridge:test
            axtx2301/bentel-absoluta-local-bridge:latest
            axtx2301/bentel-absoluta-local-bridge:${{ steps.get_version.outputs.version }}
